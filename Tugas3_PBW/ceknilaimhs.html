<html>
<head>
<title>Cek Nilai Mahasiswa</title>
<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(to right, #f2f2f2, #e6e6e6);
}
.header{
    background-color: red;
    color: white;
    text-align: center;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.container{
    width: 420px;
    background: white;
    margin: 70px auto;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
label{
    font-weight: bold;
}
input[type=text], input[type=number]{
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    transition: 0.3s;
}
input:focus{
    border-color: red;
    box-shadow: 0 0 5px rgba(255,0,0,0.4);
    outline: none;
}
button{
    background-color: red;
    color: white;
    padding: 10px 18px;
    border: none;
    margin-top: 15px;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}
button:hover{
    background-color: darkred;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.3);
}
.hasil{
    margin-top: 20px;
    padding: 10px;
    border: 1px solid #ccc;
    background-color: #f9f9f9;
}
</style>
<script>
function ceknilai()
{
    var nim = document.getElementById("nim").value;
    var nilai = parseInt(document.getElementById("nilai").value);
    var huruf;

    if(nim == "" || isNaN(nilai))
    {
        document.getElementById("hasil").innerHTML = "NIM dan Nilai harus diisi!";
        return;
    }
    if (nilai >= 80 && nilai <= 100)
    {
        huruf = "A";
    }
    else if (nilai >= 70 && nilai <= 79)
    {
        huruf = "B";
    }
    else if (nilai >= 60 && nilai <= 69)
    {
        huruf = "C";
    }
    else if (nilai >= 50 && nilai <= 59)
    {
        huruf = "D";
    }
    else if (nilai >= 0 && nilai <= 49)
    {
        huruf = "E";
    }
    else
    {
        document.getElementById("hasil").innerHTML = "Nilai tidak valid!";
        return;
    }
    document.getElementById("hasil").innerHTML =
    "NIM : " + nim + "<br>Huruf Mutu : " + huruf;
}
</script>
</head>
<body>
<div class="header">
PROGRAM CEK NILAI MAHASISWA
</div>
<div class="container">
<label>NIM :</label><br>
<input type="text" id="nim">
<br><br>
<label>Nilai :</label><br>
<input type="number" id="nilai">
<br>
<button onclick="ceknilai()">Cek Nilai</button>
<div class="hasil">
<b>Hasil :</b>
<p id="hasil"></p>
</div>
</div>
</body>
</html>
